function renderCook(){
  const terms=[...cookTerms];
  const chips=terms.map(function(t){return '<span class="ck-chip">'+esc(t)+'<button data-rm="'+esc(t)+'">×</button></span>';}).join('');
  let h='<div class="sec"><h2>Was kann ich kochen?</h2><p class="lead">Tippe Zutaten ein, die du zuhause hast — die App zeigt passende Rezepte + was fehlt.</p>';
  h+='<div class="card">';
  h+='<label class="fld">Zutat eingeben (mehrere mit Komma trennen)</label>';
  h+='<div class="row" style="gap:8px"><input type="text" id="ck_in" class="grow" placeholder="z. B. Hähnchen, Eier, Spinat …"><button class="btn olive sm" id="ck_add">+ Hinzufügen</button></div>';
  h+='<div id="ck_chips" style="margin-top:10px;min-height:28px;display:flex;flex-wrap:wrap;gap:6px">'+chips+'</div>';
  h+='<div class="row" style="margin-top:10px;gap:8px"><button class="btn olive grow" id="ck_go">🔍 Rezepte finden</button><button class="btn ghost" id="ck_clr">Alle löschen</button></div>';
  h+='<p class="muted small" style="margin-top:8px">💡 Gewürze, Öle und Knoblauch werden automatisch mitgezählt.</p>';
  h+='</div>';
  h+='<div class="filterbar" style="margin-bottom:6px"><button class="fbtn'+(ckStrict?' on':'')+'" id="ck_strict">✅ Nur fast vollständige Rezepte (≥60 %)</button></div>';
  h+='<div id="ck_res"></div></div>';
  app().innerHTML=h;
  const inp=document.getElementById('ck_in');
  function addTerms(){
    const raw=inp.value.trim(); if(!raw)return;
    raw.split(/[,;\s]+/).forEach(function(t){ const lc=t.toLowerCase().trim(); if(lc.length>=3)cookTerms.add(lc); });
    inp.value=''; renderCook(); if(cookTerms.size)drawCook();
  }
  document.getElementById('ck_add').addEventListener('click',addTerms);
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault();addTerms();} });
  document.getElementById('ck_clr').addEventListener('click',function(){ cookTerms.clear();ckStrict=false;renderCook(); });
  document.getElementById('ck_go').addEventListener('click',drawCook);
  document.getElementById('ck_strict').addEventListener('click',function(){ ckStrict=!ckStrict; renderCook(); if(cookTerms.size)drawCook(); });
  document.getElementById('ck_chips').querySelectorAll('[data-rm]').forEach(function(b){
    b.addEventListener('click',function(){ cookTerms.delete(b.getAttribute('data-rm')); renderCook(); if(cookTerms.size)drawCook(); });
  });
  if(cookTerms.size)drawCook();
}
function drawCook(){
  const terms=[...cookTerms]; const box=document.getElementById('ck_res');
  if(!terms.length||!box){ if(box)box.innerHTML='<div class="note">Tippe zuerst Zutaten ein.</div>'; return; }
  const CK_STAPLE=['salz','pfeffer','ol','oel','butter','ghee','essig','honig','kurkuma','oregano','knoblauch','ingwer','curry','zimt','muskat','chili','koriander','petersilie','thymian','basilikum','kokosol','olivenol','dattelsir'];
  function isSt(s){ var lc=s.toLowerCase().replace(/ö/g,'o').replace(/ü/g,'u').replace(/ä/g,'a'); return CK_STAPLE.some(function(k){return lc.includes(k);}); }
  const scored=allRecipes().map(function(r){
    var parts=r.i.split(';').map(function(p){return p.trim();}).filter(function(p){return p&&!isSt(p);});
    var matched=0,missing=[];
    terms.forEach(function(term){ var found=parts.some(function(p){return p.toLowerCase().includes(term);}); if(found)matched++; else missing.push(term); });
    return {r:r,matched:matched,pct:matched/terms.length,missing:missing};
  }).filter(function(x){return x.matched>0;});
  var filtered=ckStrict?scored.filter(function(x){return x.pct>=0.6;}):scored;
  filtered.sort(function(a,b){return b.pct-a.pct||a.r.n.localeCompare(b.r.n);});
  if(!filtered.length){ box.innerHTML='<div class="card center muted">Kein passendes Rezept. Mehr Zutaten eingeben oder Filter deaktivieren.</div>'; return; }
  box.innerHTML='<div class="grouphd">'+filtered.length+' Rezepte gefunden</div>'+filtered.slice(0,40).map(function(x){
    var allOk=x.missing.length===0;
    var mt=x.matched+' von '+terms.length+' Zutaten vorhanden'+(allOk?' ✅':'')+(x.missing.length?' · fehlt: '+x.missing.map(function(m){return m.charAt(0).toUpperCase()+m.slice(1);}).join(', '):'');
    return '<div class="cook-match '+(allOk?'ok':'warn')+'">'+mt+'</div>'+recCard(x.r,false);
  }).join(''); bindRecCards(box);
}

function renderProtein(){
  const opts=PROT.map((p,i)=>'<option value="'+i+'">'+esc(p.n)+' ('+p.per+' g/100 g)</option>').join('');
  let h='<div class="sec"><h2>Protein-Rechner</h2><p class="lead">Tagesziel <b>'+PROT_MIN+'–'+PROT_MAX+' g</b> · <a href="#" id="pgoal">anpassen</a></p>'+
   '<div class="card"><label class="fld">Zutat</label><select id="pi">'+opts+'</select><div class="row" style="margin-top:10px"><div class="grow"><label class="fld" id="plbl">Menge in Gramm</label><input type="number" id="pg" inputmode="numeric" placeholder="z. B. 200" min="0"></div><button class="btn" id="padd" style="align-self:flex-end">Hinzufügen</button></div><div class="note" id="phint">Eier: gib die Stückzahl ein (1 Ei ≈ 6,5 g Protein).</div></div>'+
   '<div class="card"><div class="row" style="justify-content:space-between;align-items:flex-end"><div><div class="bignum" id="ptotal">0<small> g</small></div><div class="muted small" id="pstat"></div></div><button class="btn ghost sm" id="pexample">Beispiel-Kombi</button></div><div class="meter" style="margin:14px 0 6px"><div class="fill" id="pfill"></div></div><div class="muted small" style="display:flex;justify-content:space-between"><span>0</span><span>'+PROT_MIN+'</span><span>'+PROT_MAX+'+</span></div><div class="kcalrow" id="pkcal"></div><div id="plist" style="margin-top:8px"></div><button class="btn ghost full" id="pclear" style="margin-top:10px">Tag zurücksetzen</button></div></div>';
  app().innerHTML=h;
  const pgl=document.getElementById('pgoal'); if(pgl)pgl.addEventListener('click',e=>{ e.preventDefault(); go('settings'); });
  const sel=document.getElementById('pi'),lbl=document.getElementById('plbl'),hint=document.getElementById('phint');
  function syncLbl(){ const p=PROT[+sel.value]; const egg=p&&p.egg; lbl.textContent=egg?'Anzahl (Stück)':'Menge in Gramm'; hint.style.display=egg?'block':'none'; }
  sel.addEventListener('change',syncLbl); syncLbl();
  document.getElementById('padd').addEventListener('click',()=>{ const p=PROT[+sel.value]; const val=parseFloat(document.getElementById('pg').value); if(!val||val<=0)return; const prot=p.egg?Math.round(val*6.5):Math.round(val*p.per/100); const kcal=kcalForItem(p.n,val,p.egg); saved.protein.push({n:p.n,amount:p.egg?val+' Stück':val+' g',prot,kcal}); Store.set('protein',saved.protein); document.getElementById('pg').value=''; drawProt(); });
  document.getElementById('pclear').addEventListener('click',()=>{ saved.protein=[]; Store.set('protein',saved.protein); drawProt(); });
  document.getElementById('pexample').addEventListener('click',()=>{ saved.protein=[{n:'Eier',amount:'4 Stück',prot:26,kcal:310},{n:'Rinderhack',amount:'200 g',prot:40,kcal:500},{n:'Lachs',amount:'150 g',prot:30,kcal:300},{n:'Hüttenkäse',amount:'200 g',prot:22,kcal:196},{n:'Kürbiskerne',amount:'25 g',prot:8,kcal:140}]; Store.set('protein',saved.protein); drawProt(); });
  drawProt();
}
function drawProt(){ const total=saved.protein.reduce((s,x)=>s+x.prot,0); const tEl=document.getElementById('ptotal'); if(!tEl)return;
  tEl.innerHTML=total+'<small> g</small>';
  const fill=document.getElementById('pfill'); fill.style.width=Math.min(100,total/PROT_MAX*100)+'%'; fill.classList.toggle('good',total>=PROT_MIN);

const DAYS=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
function checkinDue(){ if(!saved.checkins||!saved.checkins.length) return true; const ts=saved.checkins.map(c=>c.ts||0).reduce((m,b)=>Math.max(m,b),0); return (Date.now()-ts)>7*86400000; }
function mealsForFocus(f){ return f==='abnehmen'?1:(f==='schlank'?2:3); }
function protGroup(r){ var i=(r&&r.i||'').toLowerCase();
  if(/rinderhack|hackfleisch|gulasch|rinderbrust|rindfleisch/.test(i)) return 'rind';
  if(/hähnchen|geflügel/.test(i)) return 'huhn';
  if(/lachs|dorade|sardine/.test(i)) return 'fisch';
  if(/garnelen|gambas|scampi/.test(i)) return 'meer';
  if(/lamm/.test(i)) return 'lamm'; if(/ente/.test(i)) return 'ente'; return 'andere';
}
function buildDay(focus,target,pool,used,meals,cheap,protUsed){
  let lo,hi; if(focus==='aufbau'){lo=target;hi=target*1.15;} else if(focus==='abnehmen'){lo=target*0.85;hi=target;} else {lo=target*0.90;hi=target*1.10;}
  const mid=(lo+hi)/2; let three=[],sumK=0;
  for(let slot=0;slot<meals;slot++){ const slotsLeft=meals-slot; const ideal=Math.max(150,(mid-sumK)/slotsLeft);
    let cands=pool.filter(function(x){return !used[x.r.n] && three.indexOf(x)<0;});
    if(cheap){ var ec=cands.filter(function(x){ var pr=recipePrice(x.r); return pr&&pr.eur<4.5; }); if(ec.length>=2) cands=ec; }
    if(protUsed){ var over=Object.keys(protUsed).filter(function(k){return protUsed[k]>=3;}); if(over.length){ var vrd=cands.filter(function(x){return !over.includes(protGroup(x.r));}); if(vrd.length>=2) cands=vrd; } }
    if(!cands.length) cands=pool.filter(function(x){return three.indexOf(x)<0;});
    if(!cands.length) break;
    cands.sort(function(a,b){return Math.abs(a.kcal-ideal)-Math.abs(b.kcal-ideal);});
    const top=cands.slice(0,Math.min(cands.length,6));
    const pick=top[Math.floor(Math.random()*top.length)];
    three.push(pick); used[pick.r.n]=true; sumK+=pick.kcal; }
  let guard=0;
  while(three.reduce(function(s,x){return s+x.p;},0)<PROT_MIN && guard<12){ guard++;
    three.sort(function(a,b){return a.p-b.p;}); const weak=three[0]; const curK=three.reduce(function(s,x){return s+x.kcal;},0);
    const c=pool.filter(function(x){return !used[x.r.n] && three.indexOf(x)<0 && x.p>weak.p && (curK-weak.kcal+x.kcal)<=hi;}).sort(function(a,b){return (b.p-a.p)||(Math.abs(a.kcal-weak.kcal)-Math.abs(b.kcal-weak.kcal));});
    if(!c.length) break; const rep=c[0];
    used[weak.r.n]=false; three.shift(); used[rep.r.n]=true; three.push(rep); }
  return three;
}
function generateWeek(){

  const _bgt=saved.settings&&saved.settings.wochenbudget;

    const _bp=pool.filter(function(x){ const pr=recipePrice(x.r); return !pr||pr.eur<=_pM*2.2; });
    if(_bp.length>=20) pool=_bp; }

function weightChart(){
  const pts=saved.checkins.slice().reverse().map(c=>{ const m=(c.w||'').replace(',','.').match(/[\d.]+/); return m?parseFloat(m[0]):null; }).filter(v=>v!=null);
  if(pts.length<2)return '';
  const last=pts.slice(-8),min=Math.min(...last),max=Math.max(...last),range=(max-min)||1;
  const bars=last.map(v=>'<div class="bar" style="height:'+(20+Math.round((v-min)/range*80))+'%"><span>'+v+'</span></div>').join('');
  const lbls=last.map((v,i)=>'<div class="barlbl">'+(i+1)+'</div>').join('');
  return '<div class="card"><h3>📉 Gewichtsverlauf</h3><div class="chart">'+bars+'</div><div class="barlbls">'+lbls+'</div></div>';
}
function drawHist(){ const ch=document.getElementById('ci_chart'); if(ch)ch.innerHTML=weightChart();
  const box=document.getElementById('ci_hist'); if(!box)return;
  if(!saved.checkins.length){ box.innerHTML='<div class="muted small">Noch keine Einträge.</div>'; return; }
  box.innerHTML=saved.checkins.map((c,i)=>'<div class="card"><div class="row" style="justify-content:space-between"><b>'+esc(c.date)+'</b><button class="x" data-cidel="'+i+'">✕</button></div><div class="small" style="margin-top:6px">'+(c.w?'<div>⚖️ '+esc(c.w)+'</div>':'')+(c.e?'<div>⚡ Energie: '+esc(c.e)+'</div>':'')+(c.s?'<div>😴 Schlaf: '+esc(c.s)+'</div>':'')+(c.g?'<div style="margin-top:4px">✅ '+esc(c.g)+'</div>':'')+(c.c?'<div>🔁 '+esc(c.c)+'</div>':'')+'</div></div>').join('');
  box.querySelectorAll('[data-cidel]').forEach(b=>b.addEventListener('click',()=>{ saved.checkins.splice(+b.getAttribute('data-cidel'),1); Store.set('checkins',saved.checkins); renderCheckin(); }));
}

function renderEinkauf(){
  app().innerHTML='<div class="sec"><h2>Einkauf & Vorräte</h2><p class="lead">Deine Basis plus eine eigene, abhakbare Liste.</p><div class="card"><h3>🫙 Immer zu Hause</h3><ul class="plist">'+VORRAT.immer.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div><div class="card"><h3>🧊 Wöchentlich frisch</h3><ul class="plist">'+VORRAT.frisch.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div><div class="grouphd">🛒 Meine Einkaufsliste</div><div class="card"><div class="row"><input type="text" id="ek_in" class="grow" placeholder="Artikel hinzufügen …"><button class="btn" id="ek_add">+</button></div><div class="row" style="gap:6px;margin-top:8px"><button class="btn olive grow" id="ek_all">✓ Alle abhaken</button><button class="btn ghost grow" id="ek_clear">Erledigte entfernen</button></div><div id="ek_list" style="margin-top:10px"></div></div></div>';
  const add=()=>{ const v=document.getElementById('ek_in').value.trim(); if(!v)return; saved.einkauf.push({t:v,done:false,cat:'custom'}); Store.set('einkauf',saved.einkauf); document.getElementById('ek_in').value=''; drawEk(); };
  document.getElementById('ek_add').addEventListener('click',add);
  document.getElementById('ek_in').addEventListener('keydown',e=>{ if(e.key==='Enter')add(); });
  document.getElementById('ek_clear').addEventListener('click',()=>{ saved.einkauf=saved.einkauf.filter(x=>!x.done); Store.set('einkauf',saved.einkauf); drawEk(); });
  document.getElementById('ek_all').addEventListener('click',()=>{ saved.einkauf.forEach(x=>{x.done=true;}); Store.set('einkauf',saved.einkauf); drawEk(); });

function drawEk(){ var box=document.getElementById('ek_list'); if(!box)return;
  if(!saved.einkauf.length){ box.innerHTML='<div class="muted small" style="padding:8px 0">Liste leer – aus dem Wochenplan erzeugen ↑</div>'; return; }
  var catOrder=['🥩 Fleisch','🐟 Fisch & Meer','🥚 Eier & Milch','🥦 Gemüse & Obst','🌾 Getreide & Hülsenfrüchte','🥜 Nüsse & Saaten','🍫 Süßes & Snacks','📦 Sonstiges','custom'];
  var groups={};
  saved.einkauf.forEach(function(x,i){ var c=x.cat||'📦 Sonstiges'; if(!groups[c]) groups[c]=[]; groups[c].push({x:x,i:i}); });
  var h='';
  catOrder.forEach(function(cat){ if(!groups[cat]||!groups[cat].length)return;
    var lbl=cat==='custom'?'✏️ Eigene Einträge':cat;
    var open=groups[cat].filter(function(e){return !e.x.done;}).length;
    h+='<div class="ekcat"><div class="ekcat-hd"><span>'+esc(lbl)+'</span><span class="ek-op muted small" data-cat="'+esc(cat)+'"> ('+open+' offen)</span></div>';
    groups[cat].forEach(function(e){ h+='<label class="ekrow'+(e.x.done?' done':'')+'" data-idx="'+e.i+'"><input type="checkbox" data-ek="'+e.i+'"'+(e.x.done?' checked':'')+'>'+
      '<span>'+esc(e.x.t)+'</span></label>'; });
    h+='</div>'; });
  box.innerHTML=h;
  box.querySelectorAll('[data-ek]').forEach(function(cb){ cb.addEventListener('change',function(){ var idx=+this.getAttribute('data-ek'); saved.einkauf[idx].done=this.checked; Store.set('einkauf',saved.einkauf); this.closest('label').classList.toggle('done',this.checked); var cat=this.closest('.ekcat'); if(cat){ var op=cat.querySelectorAll('[data-ek]:not(:checked)').length; var sp=cat.querySelector('.ek-op'); if(sp) sp.textContent=' ('+op+' offen)'; } }); });
}

function matchItem(q,item){ const n=item.n.toLowerCase(); if(n.includes(q))return true; if(item.keys&&item.keys.some(k=>k.includes(q)||q.includes(k)))return true; return q.split(/\s+/).some(w=>w.length>=4&&n.includes(w)); }
function renderCheck(){
  app().innerHTML='<div class="sec"><h2>Frag &amp; Check</h2><p class="lead">Tippe ein Lebensmittel oder eine Frage ein. Die Antwort kommt aus deinen eigenen Unterlagen – optional ausführlicher per KI.</p>'
   +'<div class="search"><span class="ico">🔎</span><input type="text" id="ck_q" placeholder="z. B. Wraps, Lachs, Dose, was nach Dose essen? …"></div>'
   +'<div class="row" style="margin:8px 0"><button class="btn olive grow" id="ck_ai">🤖 Ausführlich mit KI</button><button class="btn ghost grow" id="ck_dose">🧅 Dose gegessen?</button></div>'
   +'<div id="ck_res"></div><div id="ck_aires"></div>'
   +'<div class="note">Die KI-Antwort braucht, dass du bei Claude eingeloggt bist. Ohne Login antwortet die App weiter aus deinen Daten – das geht immer und für alle.</div>'
   +'<div class="grouphd">✅ Empfohlen / erlaubt</div><div class="chips" id="ck_good"></div><div class="grouphd">🚫 Eher vermeiden</div><div id="ck_bad"></div></div>';
  document.getElementById('ck_good').innerHTML=ALLOWED.map(function(a){ const f=(typeof FOOD!=='undefined')?FOOD.find(x=>x.keys.some(k=>a.n.toLowerCase().includes(k))):null; return '<span class="pill cat">'+esc(a.n)+(f?' · ~'+f.kcal+' kcal':'')+'</span>'; }).join('');
  document.getElementById('ck_bad').innerHTML=AVOID.map(a=>'<div class="card resultcard bad"><b>'+esc(a.n)+'</b><div class="small muted" style="margin-top:4px">'+esc(a.reason)+'</div></div>').join('');
  const inp=document.getElementById('ck_q'); const res=document.getElementById('ck_res'); const air=document.getElementById('ck_aires');
  const draw=()=>{ const q=inp.value.trim(); air.innerHTML=''; if(q.length<2){ res.innerHTML=''; return; } res.innerHTML=answerQuery(q); };
  inp.addEventListener('input',draw);
  document.getElementById('ck_dose').addEventListener('click',()=>{ inp.value='Dose'; draw(); inp.focus(); });
  document.getElementById('ck_ai').addEventListener('click',async()=>{ const q=inp.value.trim(); if(q.length<2){ flash('Erst etwas eingeben'); return; } air.innerHTML='<div class="card"><span class="muted small">🤖 KI denkt nach …</span></div>';
    try{ const t=await askAI(q); air.innerHTML='<div class="card resultcard good"><span class="tag-good">🤖 KI-Antwort (auf Basis deiner Prinzipien)</span><div style="margin-top:8px;white-space:pre-wrap;line-height:1.5">'+esc(t)+'</div></div>'; }
    catch(e){ air.innerHTML='<div class="note">KI gerade nicht verfügbar (z. B. ohne Login). Antwort aus deinen Daten:</div>'+answerQuery(q); } });
}

const FRAC={'½':0.5,'¼':0.25,'¾':0.75,'⅓':1/3,'⅔':2/3,'⅛':0.125};
function fmtNum(n){ if(Math.abs(n-Math.round(n))<0.04)return String(Math.round(n)); return (Math.round(n*10)/10).toString().replace('.',','); }
function scaleIng(text,f){ if(!f||f===1)return text;
  let t=text.replace(/(\d+)\s*([½¼¾⅓⅔⅛])/g,(m,d,fr)=>String(parseInt(d)+FRAC[fr])).replace(/[½¼¾⅓⅔⅛]/g,m=>String(FRAC[m]));
  return t.replace(/(\d+(?:[.,]\d+)?)(\s*[–-]\s*)(\d+(?:[.,]\d+)?)|(\d+(?:[.,]\d+)?)/g,(m,a,sep,b,single)=>{
    if(a&&b)return fmtNum(parseFloat(a.replace(',','.'))*f)+sep+fmtNum(parseFloat(b.replace(',','.'))*f);
    if(single)return fmtNum(parseFloat(single.replace(',','.'))*f);
    return m; });
}
